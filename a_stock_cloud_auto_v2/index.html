<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>A股云端自动行情助手</title>
<style>
body{margin:0;background:#f6f7fb;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif}main{max-width:1160px;margin:auto;padding:22px}h1{margin:0 0 8px}.muted{color:#64748b}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}.card{background:white;border:1px solid #e5e7eb;border-radius:14px;padding:14px;box-shadow:0 1px 2px #0001}.value{font-size:24px;font-weight:800;margin-top:6px}table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb}th,td{border-bottom:1px solid #e5e7eb;padding:10px 8px;text-align:left;font-size:14px}th{background:#f8fafc}.tag{padding:4px 8px;border-radius:999px;font-weight:700;font-size:12px}.正常{background:#dcfce7;color:#166534}.低风险{background:#e0f2fe;color:#075985}.中风险{background:#ffedd5;color:#9a3412}.高风险{background:#fee2e2;color:#991b1b}.red{color:#dc2626;font-weight:700}.green{color:#16a34a;font-weight:700}.report{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:14px;padding:14px;line-height:1.7}.btn{border:0;border-radius:10px;background:#2563eb;color:white;padding:10px 14px;font-weight:700;cursor:pointer}@media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}th,td{font-size:12px;padding:8px 5px}.hide{display:none}}
</style></head>
<body><main>
<h1>A股云端自动行情助手</h1>
<div class="muted">自动行情 + 持仓风险 + 微信提醒。数据由 GitHub Actions 定时更新，页面只负责展示。</div>
<div class="grid">
 <div class="card"><div class="muted">更新时间</div><div id="updated" class="value" style="font-size:16px">加载中</div></div>
 <div class="card"><div class="muted">持仓市值</div><div id="mv" class="value">-</div></div>
 <div class="card"><div class="muted">持仓浮盈亏</div><div id="pnl" class="value">-</div></div>
 <div class="card"><div class="muted">高/中风险</div><div id="risk" class="value">-</div></div>
</div>
<div class="card"><button class="btn" onclick="loadData()">刷新数据</button> <span class="muted">如果刚触发 GitHub Actions，等 1-3 分钟后再刷新。</span></div>
<h2>风险总览</h2><div style="overflow:auto"><table><thead><tr><th>代码</th><th>名称</th><th>类型</th><th>收盘</th><th>涨跌%</th><th class="hide">成本</th><th class="hide">数量</th><th>盈亏%</th><th>风险</th><th class="hide">MA20</th><th class="hide">MA60</th><th class="hide">RSI</th><th>提示</th></tr></thead><tbody id="tbody"></tbody></table></div>
<h2>文字报告</h2><div id="report" class="report">加载中...</div>
<div id="errors" class="muted" style="margin-top:14px"></div>
</main><script>
function money(x){return x==null?'-':Number(x).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}
function pct(x){return x==null?'-':Number(x).toFixed(2)+'%'}
async function loadData(){
 const res=await fetch('data/latest.json?ts='+Date.now());
 if(!res.ok){document.getElementById('report').textContent='还没有生成行情数据。请先在 GitHub Actions 里手动运行一次 update-a-share-data。';return}
 const d=await res.json(); document.getElementById('updated').textContent=d.updated_at||'-';
 let mv=0,pnl=0,high=0,mid=0; const tb=document.getElementById('tbody'); tb.innerHTML=''; let lines=['【A股持仓风险日报】','更新时间：'+(d.updated_at||'-'),''];
 for(const s of d.stocks){ if(s.type==='持仓'){mv+=s.market_value||0;pnl+=s.pnl||0} if(s.risk_level==='高风险')high++; if(s.risk_level==='中风险')mid++;
 const gainCls=(s.pnl_pct||0)>=0?'green':'red'; tb.insertAdjacentHTML('beforeend',`<tr><td>${s.code}</td><td>${s.name}</td><td>${s.type}</td><td>${s.close??'-'}</td><td class="${(s.day_chg_pct||0)>=0?'green':'red'}">${pct(s.day_chg_pct)}</td><td class="hide">${s.cost??'-'}</td><td class="hide">${s.quantity??'-'}</td><td class="${gainCls}">${pct(s.pnl_pct)}</td><td><span class="tag ${s.risk_level}">${s.risk_level}</span></td><td class="hide">${s.ma20??'-'}</td><td class="hide">${s.ma60??'-'}</td><td class="hide">${s.rsi14??'-'}</td><td>${s.message}</td></tr>`);
 lines.push(`${s.code} ${s.name}｜${s.risk_level}｜收盘 ${s.close}${s.pnl_pct!=null?'｜盈亏 '+pct(s.pnl_pct):''}｜${s.message}`)}
 document.getElementById('mv').textContent=money(mv); const p=document.getElementById('pnl'); p.textContent=money(pnl); p.className='value '+(pnl>=0?'green':'red'); document.getElementById('risk').textContent=high+' / '+mid; document.getElementById('report').textContent=lines.join('\n');
 if(d.errors&&d.errors.length){document.getElementById('errors').textContent='行情失败：'+d.errors.map(e=>e.code+' '+e.name+' '+e.error).join('；')}
}
loadData();
</script></body></html>
